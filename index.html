<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dikkatli Seç! ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container { padding: 20px; transition: 0.5s; }
        h1 { color: #ff4d6d; font-size: 1.8rem; margin-bottom: 20px; }
        
        .btn-wrap { position: relative; height: 100px; display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        #yesBtn { background: #ff4d6d; color: white; }
        #noBtn { background: #95a5a6; color: white; position: absolute; left: 55%; }

        #optionsArea { display: none; flex-direction: column; gap: 12px; align-items: center; }
        .opt-btn { width: 220px; background: white; color: #ff4d6d; border: 2px solid #ff4d6d; }
        .opt-btn:hover { background: #ff4d6d; color: white; transform: scale(1.05); }

        #final { display: none; animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        .fırfır-text { 
            color: #c9184a; 
            font-size: 2.2rem; 
            font-weight: 900; 
            text-shadow: 2px 2px 10px rgba(255, 77, 109, 0.3);
            margin-bottom: 10px;
        }

        .extra-note {
            font-size: 18px;
            color: #ff4d6d;
            font-style: italic;
            background: rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="quiz" class="container">
        <h1>Beni öpmek ister misin? 🥺</h1>
        <div class="btn-wrap">
            <button id="yesBtn" onclick="showOptions()">EVET</button>
            <button id="noBtn" onmouseover="moveBtn()" onclick="moveBtn()">HAYIR</button>
        </div>
    </div>

    <div id="optionsArea" class="container">
        <h1>PEKİ NEREDEN? 🤔</h1>
        <button class="opt-btn" onclick="wrongChoice()">YANAK</button>
        <button class="opt-btn" onclick="wrongChoice()">KAFA</button>
        <button class="opt-btn" style="border: 3px solid #ff4d6d;" onclick="correctChoice()">DUDAK 💋</button>
        <button class="opt-btn" onclick="wrongChoice()">BURUN</button>
        <button class="opt-btn" onclick="wrongChoice()">BOĞAZ</button>
    </div>

    <div id="final" class="container">
        <h1 style="font-size: 80px; margin: 0;">🎉</h1>
        <div class="fırfır-text">DOĞRU TAHMİN<br>FIRFIR ÇOK MUTLU</div>
        <div class="extra-note">Buna en son tıklayacağını biliyordum :)</div>
        <p style="font-size: 18px; color: #ff4d6d; margin-top: 20px; font-weight: bold;">Seni çok seviyorum! ❤️</p>
    </div>

    <script>
        function moveBtn() {
            const btn = document.getElementById('noBtn');
            const maxX = window.innerWidth - btn.offsetWidth - 20;
            const maxY = window.innerHeight - btn.offsetHeight - 20;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            btn.style.position = "fixed";
            btn.style.left = randomX + "px";
            btn.style.top = randomY + "px";
        }

        function showOptions() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('optionsArea').style.display = 'flex';
        }

        function wrongChoice() {
            alert("Burası olmaz, tekrar dene! 😏");
        }

        function correctChoice() {
            document.getElementById('optionsArea').style.display = 'none';
            document.getElementById('final').style.display = 'block';
            document.body.style.backgroundColor = '#ffe3e8';
        }
    </script>
</body>
</html>
